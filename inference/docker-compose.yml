services:
  # ── Tests ────────────────────────────────────────────────────────────────── #
  unit:
    build: .
    command:
      - "commitllm/tests/test_freivalds.py"
      - "commitllm/tests/test_receipt.py"
      - "-v"

  integration:
    build: .
    command:
      - "commitllm/tests/"
      - "-m"
      - "integration"
      - "-v"
    volumes:
      - ~/.cache/huggingface:/hf_cache
    environment:
      - HF_HOME=/hf_cache

  all:
    build: .
    command:
      - "commitllm/tests/"
      - "-v"
    volumes:
      - ~/.cache/huggingface:/hf_cache
    environment:
      - HF_HOME=/hf_cache

  # ── VeChain solo node ────────────────────────────────────────────────────── #
  thor:
    image: ghcr.io/vechain/thor:latest
    command: ["solo", "--api-addr", "0.0.0.0:8669", "--api-cors", "*", "--api-enable-txpool"]
    ports:
      - "8669:8669"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8669/blocks/best"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── End-to-end demo ──────────────────────────────────────────────────────── #
  demo:
    build: .
    entrypoint: ["python", "/app/py/demo.py", "http://thor:8669"]
    depends_on:
      thor:
        condition: service_healthy
    volumes:
      - ~/.cache/huggingface:/hf_cache
    environment:
      - HF_HOME=/hf_cache

  # ── OpenAI-compatible proxy (VeChain bridge) ─────────────────────────────── #
  openai-proxy:
    build: .
    entrypoint:
      - "python"
      - "-m"
      - "uvicorn"
      - "openai_proxy:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    ports:
      - "8000:8000"
    environment:
      - THOR_URL=http://thor:8669
    depends_on:
      thor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/models')"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Open WebUI ────────────────────────────────────────────────────────────── #
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://openai-proxy:8000/v1
      - OPENAI_API_KEY=sk-vechain
      - WEBUI_AUTH=False
      - ENABLE_OLLAMA_API=False
    depends_on:
      openai-proxy:
        condition: service_healthy
    volumes:
      - open-webui-data:/app/backend/data

  # ── Malicious inference node (Byzantine PoC) ────────────────────────────── #
  # Not started by default. Run with:
  #   docker compose --profile byzantine up malicious
  malicious:
    profiles: [byzantine]
    build: .
    entrypoint:
      - "python"
      - "/app/py/malicious_node.py"
      - "35b5cc144faca7d7f220fca7ad3420090861d5231d80eb23e1013426847371c4"
      - "Qwen/Qwen2.5-1.5B-Instruct"
      - "Qwen/Qwen2.5-0.5B-Instruct"
      - "http://thor:8669"
    volumes:
      - ~/.cache/huggingface:/hf_cache
    environment:
      - HF_HOME=/hf_cache
    depends_on:
      thor:
        condition: service_healthy

  # ── Checker node (verifies INRS receipts, posts INCH verdicts) ───────────── #
  checker:
    build: .
    entrypoint:
      - "python"
      - "/app/py/checker_node.py"
      - "f4a1a17039216f535d42ec23732c79943ffb45a089fbb78a14daad0dae93e991"
      - "http://thor:8669"
    volumes:
      - ~/.cache/huggingface:/hf_cache
    environment:
      - HF_HOME=/hf_cache
    depends_on:
      thor:
        condition: service_healthy

  # ── Inference Explorer ───────────────────────────────────────────────────── #
  explorer:
    build: .
    entrypoint:
      - "python"
      - "-m"
      - "uvicorn"
      - "explorer:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8088"
    ports:
      - "8088:8088"
    environment:
      - THOR_URL=http://thor:8669
    depends_on:
      thor:
        condition: service_healthy

volumes:
  open-webui-data:
