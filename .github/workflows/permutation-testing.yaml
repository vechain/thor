name: Permutation Testing

on:
  schedule:
    # Run every Tuesday at 20:00 UTC
    - cron: '0 20 * * 2'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read

jobs:
  permutation-test:
    name: Run Permutation Tests
    # Uses AWS CodeBuild managed runners for higher memory capacity (64GB)
    # The permutation tests are memory-intensive and require more resources than standard GitHub runners
    runs-on:
      - codebuild-ThorGHA-${{ github.run_id }}-${{ github.run_attempt }}
      - image:arm-3.0
      - instance-size:xlarge # 32 vCPUs, 64 GiB memory
    timeout-minutes: 240 # 4 hours
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Permutation Tests
        env:
          RUN_PERMUTATIONS: "1"
        run: go test -v -timeout=4h ./builtin/staker -run TestRandomPermutationManager

  notify-slack:
    name: Notify Slack on Failure
    needs: permutation-test
    if: always() && needs.permutation-test.result != 'success'
    uses: ./.github/workflows/notify-slack.yaml
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    with:
      payload: |
        {
          "unit-test-status": ":alert: Permutation Test Failure",
          "docker-publish-status": ":fast_forward: Skipped",
          "commit-message": ${{ toJSON(github.event.head_commit.message) }},
          "commit-url": "${{ github.event.head_commit.url }}",
          "e2e-test-status": ":fast_forward: Skipped",
          "branch": "${{ github.ref }}",
          "repository": "${{ github.repository }}",
          "commit-author": "${{ github.event.head_commit.author.name }}",
          "lint-status": ":fast_forward: Skipped",
          "license-check": ":fast_forward: Skipped",
          "module-check": ":fast_forward: Skipped"
        }